version: '3.8'
services:
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.0
    restart: always
    ports:
      - '1514:1514'
      - '55000:55000'
    volumes:
      - ./rules:/var/ossec/etc/rules/custom

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.0
    restart: always
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.0
    restart: always
    ports:
      - '443:5601'
    depends_on:
      - wazuh-indexer
      - wazuh-manager
